server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  # Server1(10.0.0.116) Loki로 전송
  - url: http://10.0.0.116:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels:
          ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - source_labels:
          ['__meta_docker_container_label_com_docker_compose_project']
        target_label: project
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      # server 구분용 라벨 추가
      - target_label: server
        replacement: server2
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            logger: logger
            message: message
            app: app
            env: env
            requestId: requestId
            traceId: traceId
      - labels:
          level:
          app:
          env:
          container:
          service:
          server: # server1 / server2 구분
