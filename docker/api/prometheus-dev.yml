global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'spring'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api:8080']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'opensearch'
    static_configs:
      - targets: ['opensearch-exporter:9114']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'debezium'
    static_configs:
      - targets: ['debezium:9404']

  - job_name: 'kafka-jmx'
    static_configs:
      - targets: ['kafka:9405']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
