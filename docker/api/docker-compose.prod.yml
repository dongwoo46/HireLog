services:
  # ──────────────────────────────────────────────
  # Redis (prod: 외부 노출 없음, redis-stack)
  # REDIS_ARGS 는 .env.prod 에 정의:
  # REDIS_ARGS=--requirepass <password> --maxmemory 512mb --maxmemory-policy allkeys-lru
  # ──────────────────────────────────────────────
  redis:
    image: redis/redis-stack-server:latest
    container_name: redis
    restart: unless-stopped
    env_file:
      - .env.prod
    expose:
      - '6379'
    volumes:
      - ./data/redis:/data
    networks:
      - hirelog_internal
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a $$REDIS_PASSWORD ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: redis-exporter
    restart: unless-stopped
    env_file:
      - .env.prod
    expose:
      - '9121'
    networks:
      - hirelog_internal
    depends_on:
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Monitoring (prod: 외부 노출 없음)
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    expose:
      - '9090'
    networks:
      - hirelog_internal
      - hirelog_external

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    env_file:
      - .env.prod
    environment:
      GF_SERVER_ROOT_URL: https://hirelog.kro.kr/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: 'true'
      GF_SERVER_PROTOCOL: http
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - hirelog_internal
      - hirelog_external
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    ports:
      - '10.0.0.116:3100:3100' # Server2 promtail → Server1 Loki 수신
    volumes:
      - ./data/loki:/loki
      - ./loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - hirelog_internal

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    restart: unless-stopped
    user: root
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/config.yml
      - ./data/promtail:/var/lib/promtail
    command: -config.file=/etc/promtail/config.yml
    networks:
      - hirelog_internal
    depends_on:
      - loki

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter_api
    restart: unless-stopped
    pid: host
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  # ──────────────────────────────────────────────
  # Spring Boot API (prod: Blue-Green, ghcr.io 이미지)
  # ──────────────────────────────────────────────
  api-blue:
    image: ghcr.io/${GITHUB_USERNAME}/hirelog-api:${IMAGE_TAG:-latest}
    container_name: api-blue
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - '127.0.0.1:8080:8080'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hirelog_internal
      - hirelog_external
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://localhost:8080/actuator/health || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  api-green:
    image: ghcr.io/${GITHUB_USERNAME}/hirelog-api:${IMAGE_TAG:-latest}
    container_name: api-green
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - '127.0.0.1:8081:8080'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hirelog_internal
      - hirelog_external
    profiles: ['green']
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://localhost:8080/actuator/health || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ──────────────────────────────────────────────
  # Python 전처리 파이프라인 (prod: ghcr.io 이미지)
  # Kafka consumer → Blue-Green 불필요, 단일 인스턴스
  # Server2(10.0.1.6) Kafka 직접 연결 → hirelog_external 필요
  # ──────────────────────────────────────────────
  preprocess:
    image: ghcr.io/${GITHUB_USERNAME}/hirelog-preprocess:latest
    container_name: preprocess
    restart: unless-stopped
    env_file:
      - .env.prod
    networks:
      - hirelog_external

networks:
  hirelog_internal:
    driver: bridge
    internal: true # Redis, 모니터링 등 외부 접근 차단
  hirelog_external:
    driver: bridge # Server2(10.0.1.6) 접근용
    ipam:
      config:
        - subnet: 172.20.0.0/16
