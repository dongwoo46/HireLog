global:
  scrape_interval: 5s

scrape_configs:
  # ──────────────────────────────────────────────
  # server1 (hirelog-infra, 10.0.1.6) — Spring Boot API, Redis, 모니터링
  # redis-exporter, spring은 Prometheus와 같은 docker network → 컨테이너명 or 같은호스트 IP
  # ──────────────────────────────────────────────

  - job_name: 'spring'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['10.0.1.6:8080'] # server1 (hirelog-infra)

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121'] # server1 — 같은 docker network이므로 컨테이너명 사용

  # ──────────────────────────────────────────────
  # server2 (hirelog-api, 10.0.0.116) — Kafka, PostgreSQL, OpenSearch
  # ──────────────────────────────────────────────

  - job_name: 'kafka'
    static_configs:
      - targets: ['10.0.0.116:9308'] # server2

  - job_name: 'postgres'
    static_configs:
      - targets: ['10.0.0.116:9187'] # server2

  - job_name: 'opensearch'
    static_configs:
      - targets: ['10.0.0.116:9114'] # server2

  - job_name: 'debezium'
    static_configs:
      - targets: ['10.0.0.116:9404'] # server2

  - job_name: 'kafka-jmx'
    static_configs:
      - targets: ['10.0.0.116:9405'] # server2

  # ──────────────────────────────────────────────
  # Node Exporter — 서버별 시스템 메트릭 (CPU, Memory, Disk, Network)
  # ──────────────────────────────────────────────

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['10.0.1.6:9100'] # server1 (hirelog-infra)
        labels:
          server_name: 'server1 (hirelog-infra)'
      - targets: ['10.0.0.116:9100'] # server2 (hirelog-api)
        labels:
          server_name: 'server2 (hirelog-api)'
