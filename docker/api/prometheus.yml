global:
  scrape_interval: 5s

scrape_configs:
  # ──────────────────────────────────────────────
  # API Server (10.0.0.116) — Spring Boot, Redis
  # Prometheus와 같은 docker network → 컨테이너명 사용
  # ──────────────────────────────────────────────

  - job_name: 'spring'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-blue:8080', 'api-green:8080'] # 컨테이너명 직접 참조 (활성 슬롯만 응답)

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121'] # 같은 docker network → 컨테이너명 사용

  # ──────────────────────────────────────────────
  # Infra Server (10.0.1.6) — Kafka, PostgreSQL, OpenSearch, Debezium
  # hirelog_external 네트워크를 통해 접근
  # ──────────────────────────────────────────────

  - job_name: 'kafka'
    static_configs:
      - targets: ['10.0.1.6:9308'] # infra server — kafka-exporter

  - job_name: 'postgres'
    static_configs:
      - targets: ['10.0.1.6:9187'] # infra server — postgres-exporter

  - job_name: 'opensearch'
    static_configs:
      - targets: ['10.0.1.6:9114'] # infra server — opensearch-exporter

  - job_name: 'debezium'
    static_configs:
      - targets: ['10.0.1.6:9404'] # infra server — debezium jmx

  - job_name: 'kafka-jmx'
    static_configs:
      - targets: ['10.0.1.6:9405'] # infra server — kafka jmx

  # ──────────────────────────────────────────────
  # Node Exporter — 서버별 시스템 메트릭 (CPU, Memory, Disk, Network)
  # ──────────────────────────────────────────────

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['10.0.0.116:9100'] # API server (hirelog-api)
        labels:
          server_name: 'api-server (10.0.0.116)'
      - targets: ['10.0.1.6:9100'] # Infra server (hirelog-infra)
        labels:
          server_name: 'infra-server (10.0.1.6)'
