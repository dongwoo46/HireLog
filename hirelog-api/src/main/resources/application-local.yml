spring:
  config:
    import: "optional:file:.env.dev[.properties]"

  kafka:
    bootstrap-servers: localhost:19092
    consumer:
      enable-auto-commit: false
      group-id: hirelog-consumer-group
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    admin:
      auto-create: true # 운영환경에서는 false로 설정

  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: http://localhost:8080/login/oauth2/code/google
          kakao:
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
  http:
    client:
      factory: http_components
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: false          # ❌ local은 Flyway 안 씀

  jpa:
    hibernate:
      ddl-auto: update # ⭐ local 핵심


hirelog:
  worker:
    job-summary:
      # true: 백그라운드 공고 요약 워커 실행, false: 워커 비활성화
      enabled: false
  loadtest:
    # true: 중복 검사 생략(부하테스트용), false: 중복 검사 수행
    skip-duplicate-check: false
    # true: Fake LLM 빈 사용(FakeLlmConfig 활성화), false: 실제 OpenAI/Gemini 빈 사용
    fake-llm: false

opensearch:
  host: ${OPENSEARCH_HOST:localhost}
  port: 9200
  scheme: http
  username: admin

app:
  storage:
    base-dir: C:/Users/dw/Desktop/HireLog/storage

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: hirelog
      profile: loadtest

    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.95,0.99
