spring:
  config:
    import: "optional:file:.env.dev[.properties]"

  kafka:
    bootstrap-servers: localhost:19092
    consumer:
      enable-auto-commit: false
      group-id: hirelog-consumer-group
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      security.protocol: SASL_PLAINTEXT
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="${KAFKA_USERNAME}" password="${KAFKA_PASSWORD}";
    admin:
      auto-create: true # 운영환경에서는 false로 설정

  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: http://localhost:8080/login/oauth2/code/google
          kakao:
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
  http:
    client:
      factory: http_components
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: false          # ❌ local은 Flyway 안 씀

  jpa:
    hibernate:
      ddl-auto: create # ⭐ local 핵심


hirelog:
  worker:
    job-summary:
      enabled: true

opensearch:
  host: localhost
  port: 9200
  scheme: https
  username: admin
  password: ${OPENSEARCH_PASSWORD}

app:
  storage:
    base-dir: C:/Users/dw/Desktop/HireLog/storage

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: hirelog
      profile: loadtest

    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.95,0.99

