services:

  hirelog-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hirelog-api:latest
    container_name: hirelog-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - hirelog-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  hirelog-net:
    external: true
