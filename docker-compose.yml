services:
  postgres:
    image: postgres:16
    container_name: pg_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: hirelog
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: hirelog_dev
      TZ: Asia/Seoul
    ports:
      - '0.0.0.0:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hirelog_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hirelog']
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.2
    container_name: kafka_dev
    restart: unless-stopped
    ports:
      - '0.0.0.0:19092:19092'
      - '0.0.0.0:9092:9092'
      - '0.0.0.0:9405:9405'
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./docker/infra/jmx_exporter/jmx_prometheus_javaagent.jar:/opt/jmx_prometheus_javaagent.jar
      - ./docker/infra/jmx_exporter/kafka.yml:/opt/kafka.yml
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OPTS: >
        -javaagent:/opt/jmx_prometheus_javaagent.jar=9405:/opt/kafka.yml
      TZ: Asia/Seoul
    networks:
      - hirelog_network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    restart: unless-stopped
    ports:
      - '0.0.0.0:8085:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: hirelog
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - hirelog_network
    depends_on:
      - kafka

  debezium:
    image: debezium/connect:2.6
    container_name: debezium_dev
    restart: unless-stopped
    ports:
      - '0.0.0.0:8083:8083'
      - '0.0.0.0:9404:9404'
    volumes:
      - ./docker/infra/jmx_exporter/jmx_prometheus_javaagent.jar:/opt/jmx_prometheus_javaagent.jar
      - ./docker/infra/jmx_exporter/debezium.yml:/opt/debezium.yml
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: hirelog-debezium
      CONFIG_STORAGE_TOPIC: hirelog_debezium_config
      OFFSET_STORAGE_TOPIC: hirelog_debezium_offset
      STATUS_STORAGE_TOPIC: hirelog_debezium_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER_SCHEMAS_ENABLE: 'false'
      CONNECT_ERRORS_LOG_ENABLE: 'true'
      CONNECT_ERRORS_LOG_INCLUDE_MESSAGES: 'true'
      KAFKA_OPTS: >
        -javaagent:/opt/jmx_prometheus_javaagent.jar=9404:/opt/debezium.yml
      TZ: Asia/Seoul
    depends_on:
      - kafka
      - postgres
    networks:
      - hirelog_network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8083/']
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: opensearch_dev
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - cluster.name=hirelog-opensearch
      - node.name=opensearch-node-1
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - TZ=Asia/Seoul
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - '0.0.0.0:9200:9200'
      - '0.0.0.0:9600:9600'
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - hirelog_network
    healthcheck:
      test:
        [
          'CMD',
          'curl',
          '-f',
          'http://localhost:9200/_cluster/health',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: opensearch_dashboards_dev
    restart: unless-stopped
    ports:
      - '0.0.0.0:5601:5601'
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
    depends_on:
      - opensearch
    networks:
      - hirelog_network

  kafka-exporter:
    image: danielqsj/kafka-exporter
    container_name: kafka_exporter_dev
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        /bin/kafka_exporter \
          --kafka.server=kafka:9092
    ports:
      - '0.0.0.0:9308:9308'
    networks:
      - hirelog_network
    depends_on:
      - kafka

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres_exporter_dev
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: 'postgresql://hirelog@postgres:5432/hirelog_dev?sslmode=disable'
    ports:
      - '0.0.0.0:9187:9187'
    networks:
      - hirelog_network
    depends_on:
      - postgres

  opensearch-exporter:
    image: justwatch/elasticsearch_exporter
    container_name: opensearch_exporter_dev
    restart: unless-stopped
    command:
      - '--es.uri=http://opensearch:9200'
    ports:
      - '0.0.0.0:9114:9114'
    networks:
      - hirelog_network
    depends_on:
      - opensearch

  node-exporter:
    image: prom/node-exporter
    container_name: node_exporter
    ports:
      - '0.0.0.0:9100:9100'
    networks:
      - hirelog_network

  redis:
    image: redis:7.2
    container_name: redis_dev
    restart: unless-stopped
    ports:
      - '0.0.0.0:6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - hirelog_network
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: redis_exporter_dev
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - '0.0.0.0:9121:9121'
    networks:
      - hirelog_network
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./docker/api/prometheus-dev.yml:/etc/prometheus/prometheus.yml
    ports:
      - '0.0.0.0:9090:9090'
    networks:
      - hirelog_network

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - '0.0.0.0:3000:3000'
    environment:
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/api/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - hirelog_network
    depends_on:
      - prometheus

networks:
  hirelog_network:
    external: true

volumes:
  postgres_data:
  kafka_data:
  opensearch_data:
  redis_data:
  grafana_data:
