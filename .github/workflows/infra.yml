name: Deploy Infra

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. 파일 동기화 ───────────────────────────────────────────────────────────
  sync:
    name: Sync files to infra server
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.head.ref == 'infra')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # docker/infra/* → /home/hirelog/ (strip docker/infra 경로)
      - name: Copy docker/infra to infra server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_INFRA_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.SERVER_API_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker/infra/"
          target: "/home/hirelog/"
          strip_components: 2

      # scripts/* → /home/hirelog/scripts/
      - name: Copy scripts to infra server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_INFRA_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.SERVER_API_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          source: "scripts/"
          target: "/home/hirelog/"

      # .env.prod는 gitignore → Secret에서 주입
      - name: Write .env.prod to infra server
        uses: appleboy/ssh-action@v1.0.3
        env:
          INFRA_ENV_PROD: ${{ secrets.INFRA_ENV_PROD }}
        with:
          host: ${{ secrets.SERVER_INFRA_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.SERVER_API_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          envs: INFRA_ENV_PROD
          script: |
            mkdir -p /home/hirelog
            printf '%s\n' "$INFRA_ENV_PROD" > /home/hirelog/.env.prod
            echo "✅ .env.prod written"

  # ── 2. 컨테이너 기동 ─────────────────────────────────────────────────────────
  start:
    name: Start infra services
    needs: sync
    runs-on: ubuntu-latest

    steps:
      - name: Prepare host & run docker-compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_INFRA_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.SERVER_API_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            WORKDIR=/home/hirelog

            # OpenSearch 필수: vm.max_map_count
            sudo sysctl -w vm.max_map_count=262144
            grep -q 'vm.max_map_count' /etc/sysctl.conf \
              || echo 'vm.max_map_count=262144' | sudo tee -a /etc/sysctl.conf

            # kafka(uid=1000), opensearch(uid=1000) 데이터 디렉토리 권한
            sudo mkdir -p "$WORKDIR/data/kafka" "$WORKDIR/data/opensearch" "$WORKDIR/data/promtail"
            sudo chown -R 1000:1000 "$WORKDIR/data/kafka" "$WORKDIR/data/opensearch"

            echo "▶ Starting docker-compose..."
            docker compose \
              --env-file "$WORKDIR/.env.prod" \
              -f "$WORKDIR/docker-compose.prod.yml" \
              up -d --remove-orphans

            echo "✅ docker-compose started"
            docker ps

      - name: Wait for core containers to be healthy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_INFRA_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.SERVER_API_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            # debezium은 제외 → cdc job에서 별도 대기
            CONTAINERS="postgres pgbouncer kafka opensearch"

            echo "▶ Waiting for containers to be healthy (max 120s each)..."
            for container in $CONTAINERS; do
              echo "  Checking: $container"
              for i in $(seq 1 24); do
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$container" 2>/dev/null || echo "missing")
                if [ "$STATUS" = "healthy" ]; then
                  echo "  ✅ $container is healthy"
                  break
                fi
                if [ "$i" -eq 24 ]; then
                  echo "  ❌ $container not healthy after 120s (status: $STATUS)"
                  echo "  --- $container logs (last 50 lines) ---"
                  docker logs "$container" --tail 50 2>&1 || true
                  docker ps -a
                  exit 1
                fi
                sleep 5
              done
            done

            echo "✅ All core containers are healthy"

  # ── 3. Kafka 토픽 생성 ───────────────────────────────────────────────────────
  kafka:
    name: Create Kafka topics
    needs: start
    runs-on: ubuntu-latest

    steps:
      - name: Create topics
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_INFRA_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.SERVER_API_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            WORKDIR=/home/hirelog

            chmod +x "$WORKDIR/scripts/create-kafka-topic-prod.sh"
            bash "$WORKDIR/scripts/create-kafka-topic-prod.sh"

      - name: Verify topics
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_INFRA_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.SERVER_API_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            EXPECTED_TOPICS=(
              "jd.preprocess.response"
              "jd.preprocess.response.fail"
              "hirelog.outbox.JobSummary"
              "hirelog.outbox.JdPreprocessText"
              "hirelog.outbox.JdPreprocessOcr"
              "hirelog.outbox.JdPreprocessUrl"
            )

            TOPIC_LIST=$(docker exec kafka_prod sh -c "
              unset KAFKA_OPTS && \
              /opt/kafka/bin/kafka-topics.sh \
                --bootstrap-server localhost:29092 \
                --list
            ")

            ALL_OK=true
            for topic in "${EXPECTED_TOPICS[@]}"; do
              if echo "$TOPIC_LIST" | grep -qx "$topic"; then
                echo "  ✅ $topic"
              else
                echo "  ❌ $topic (missing)"
                ALL_OK=false
              fi
            done

            if [ "$ALL_OK" = false ]; then
              echo "❌ Kafka topic verification failed"
              exit 1
            fi
            echo "✅ All Kafka topics verified"

  # ── 4. CDC 설정 ──────────────────────────────────────────────────────────────
  cdc:
    name: Setup CDC connector
    needs: kafka
    runs-on: ubuntu-latest

    steps:
      - name: Setup Postgres CDC
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_INFRA_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.SERVER_API_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            WORKDIR=/home/hirelog

            chmod +x "$WORKDIR/scripts/setup-postgres-cdc-prod.sh"
            bash "$WORKDIR/scripts/setup-postgres-cdc-prod.sh"

      - name: Verify Debezium connector
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_INFRA_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.SERVER_API_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            DEBEZIUM_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' debezium)
            CONNECT_URL="http://${DEBEZIUM_IP}:8083"
            CONNECTOR_NAME="hirelog-outbox-connector"

            # 커넥터가 존재하지 않으면 테이블 미준비(Spring 미배포) → 스킵
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${CONNECT_URL}/connectors/${CONNECTOR_NAME}" 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" -ne 200 ]; then
              echo "⚠️  Connector not found - outbox_event 테이블이 없어 CDC setup이 스킵됨"
              echo "   Spring 배포 후 setup-postgres-cdc-prod.sh 를 수동으로 실행하거나 infra workflow 재실행"
              echo "🎉 Infra deploy complete (CDC pending)"
              exit 0
            fi

            # 커넥터 RUNNING 상태 대기 (최대 60초)
            for i in $(seq 1 12); do
              STATE=$(curl -sf "${CONNECT_URL}/connectors/${CONNECTOR_NAME}/status" 2>/dev/null \
                | grep -o '"state":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "")
              if [ "$STATE" = "RUNNING" ]; then
                echo "✅ Debezium connector is RUNNING"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "❌ Debezium connector state: ${STATE:-unknown}"
                curl -sf "${CONNECT_URL}/connectors/${CONNECTOR_NAME}/status" || true
                exit 1
              fi
              echo "  Waiting for connector... ($i/12)"
              sleep 5
            done

            echo "🎉 Infra deploy complete"
