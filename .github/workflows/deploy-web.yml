name: Deploy Web

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'hirelog-web/**'
  workflow_dispatch:

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.head.ref == 'develop')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hirelog-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: hirelog-web

      - name: Build
        run: npm run build
        working-directory: hirelog-web
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_MODE: production

      - name: Set release name
        id: vars
        run: echo "release=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_API_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: 'hirelog-web/dist/'
          target: '/var/www/hirelog/releases/${{ steps.vars.outputs.release }}'
          strip_components: 2

      - name: Switch symlink & reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_API_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            RELEASE=${{ steps.vars.outputs.release }}

            ln -sfn /var/www/hirelog/releases/${RELEASE} /var/www/hirelog/current

            sudo nginx -t && sudo systemctl reload nginx

            # 이전 릴리스 5개만 유지
            cd /var/www/hirelog/releases
            ls -dt */ | tail -n +6 | xargs -r rm -rf

            echo "✅ Deployed: ${RELEASE}"
