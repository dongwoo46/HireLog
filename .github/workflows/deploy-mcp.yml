name: Deploy MCP

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'hirelog-mcp/**'
      - '.github/workflows/deploy-mcp.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/dongwoo46/hirelog-mcp

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.head.ref == 'develop')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: hirelog-mcp
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache,mode=max

  deploy:
    needs: build
    if: >-
      always() &&
      needs.build.result != 'failure' &&
      needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure target directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_API_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            sudo mkdir -p /home/hirelog-mcp
            sudo chown -R $(whoami):$(whoami) /home/hirelog-mcp

      - name: Write MCP env file
        uses: appleboy/ssh-action@v1.0.3
        env:
          MCP_ENV_PROD: ${{ secrets.MCP_ENV_PROD }}
        with:
          host: ${{ secrets.SERVER_API_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: MCP_ENV_PROD
          script: |
            set -e
            printf '%s\n' "$MCP_ENV_PROD" > /home/hirelog-mcp/.env
            echo "MCP .env written"

      - name: Pull image and restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_API_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            IMAGE=${{ env.IMAGE }}
            TAG=${{ needs.build.outputs.image_tag }}
            APP_ENV=/home/hirelog-mcp/.env
            CONTAINER=hirelog-mcp

            echo "Deploying ${IMAGE}:${TAG}"
            docker pull ${IMAGE}:${TAG}

            docker rm -f ${CONTAINER} 2>/dev/null || true

            docker run -d \
              --name ${CONTAINER} \
              --restart unless-stopped \
              --env-file ${APP_ENV} \
              -p 127.0.0.1:8787:8787 \
              ${IMAGE}:${TAG}

            docker ps --filter "name=${CONTAINER}" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            docker logs --tail 50 ${CONTAINER}
