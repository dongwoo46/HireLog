name: Deploy Preprocess

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - "preprocess-pipeline/**"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/dongwoo46/hirelog-preprocess

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.head.ref == 'develop')
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push image
        uses: docker/build-push-action@v6
        with:
          context: preprocess-pipeline
          push: true
          platforms: linux/arm64
          no-cache: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose & config files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_API_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: >-
            docker/api/docker-compose.prod.yml,
            docker/api/prometheus.yml,
            docker/api/loki-config.yml,
            docker/api/promtail-config.yml,
            docker/api/grafana/
          target: "/home/hirelog/"
          strip_components: 2

      - name: Deploy Preprocess
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_API_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            export GITHUB_USERNAME=${{ github.repository_owner }}
            export PREPROCESS_IMAGE=ghcr.io/dongwoo46/hirelog-preprocess:${{ needs.build.outputs.image_tag }}
            WORKDIR=/home/hirelog
            COMPOSE="docker compose --env-file $WORKDIR/.env.prod -f $WORKDIR/docker-compose.prod.yml"

            echo "▶ Image: $PREPROCESS_IMAGE"

            DOCKER_DIR="/var/lib/docker"

            DISK_USAGE=$(df $DOCKER_DIR | tail -1 | awk '{print $5}' | sed 's/%//')

            echo "▶ Docker disk usage: ${DISK_USAGE}%"

            if [ "$DISK_USAGE" -gt 80 ]; then
              echo "⚠️ Disk usage > 80%, running docker cleanup..."

              # 안전한 순서
              docker image prune -af
              docker builder prune -af

              # 필요할 때만 system prune
              docker system prune -f

              echo "✅ Docker cleanup completed"
            else
              echo "✅ Disk usage OK, skip cleanup"
            fi

            docker image prune -af
            docker builder prune -af

            docker pull $PREPROCESS_IMAGE

            $COMPOSE up -d --no-deps preprocess

            echo "🎉 Deploy complete: $PREPROCESS_IMAGE"
